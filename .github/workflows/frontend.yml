name: CI/CD Frontend

on:
  push:
    branches:
      - master
    paths:
      - 'frontend/**'

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Cache Node modules
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: frontend-npm-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            frontend-npm-

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        run: |
          docker buildx build \
            --platform linux/arm64 \
            -t ghcr.io/gabrielaleks/lista-frontend:latest \
            -f frontend/Dockerfile \
            --target production \
            --push \
            --cache-from=type=registry,ref=ghcr.io/gabrielaleks/lista-frontend:cache \
            --cache-to=type=registry,ref=ghcr.io/gabrielaleks/lista-frontend:cache,mode=max \
            .
